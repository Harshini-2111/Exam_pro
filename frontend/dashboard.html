<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="nav-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; padding: 20px;">
        <h1>Welcome, <span id="user-display" style="color: #00d2ff;">User</span></h1>
        
        <div style="display: flex; align-items: center; gap: 20px;">
            <div onclick="window.location.href='profile.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);">
                <img id="profile-pic" src="" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00d2ff; object-fit: cover;">
            </div>
            </div>
    </div>

    <div id="dashboard-content">
        <p style="text-align: center;">Loading subjects...</p>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
